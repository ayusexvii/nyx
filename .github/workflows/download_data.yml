name: Daily UniProt Download

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download EC 1.1 sequences
        run: |
          mkdir -p data/daily
          curl -L "https://rest.uniprot.org/uniprotkb/stream?format=fasta&query=reviewed:true+AND+ec:1.1.*&size=5000" \
            > data/daily/ec1.1_$(date +'%Y%m%d').fasta
      
      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          hf auth login --token $HF_TOKEN
          hf upload ayuse/nyx-enzymes data/daily/ --repo-type=dataset
